<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1c1c1c;--surface:#232323;--surface2:#2a2a2a;--surface3:#303030;
    --border:rgba(255,255,255,0.08);--text:#e8e8f0;--text-muted:#888;
    --accent:#7c5cfc;--accent2:#fc5cf4;
    --logo-orange:#ff5500;--logo-orange2:#ff8c00;
  }
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 60% 0%, #2e2a28 0%, #1c1c1c 45%, #141414 100%);pointer-events:none;z-index:0}

  header{position:relative;z-index:10;display:flex;align-items:center;gap:20px;padding:18px 32px;border-bottom:1px solid var(--border);background:rgba(20,20,20,0.97);backdrop-filter:blur(12px)}
  header img{height:34px;width:auto;filter:brightness(1.1)}
  header .sep{width:1px;height:26px;background:var(--border)}
  header h1{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);letter-spacing:0.14em;text-transform:uppercase}

  .main{position:relative;z-index:1;display:grid;grid-template-columns:320px 1fr 360px;height:calc(100vh - 73px)}

  /* SIDEBAR */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:22px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:22px}
  .section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
  .color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .color-swatch-wrap{position:relative;width:38px;height:38px;border-radius:9px;overflow:hidden;cursor:pointer;border:2px solid var(--border);flex-shrink:0;transition:border-color 0.2s}
  .color-swatch-wrap:hover{border-color:var(--accent)}
  .color-swatch-wrap input[type=color]{position:absolute;width:200%;height:200%;top:-50%;left:-50%;cursor:pointer;border:none;padding:0;background:none}
  .swatch-preview{position:absolute;inset:0;pointer-events:none;border-radius:7px}
  .hash-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.05em;outline:none;transition:border-color 0.2s}
  .hash-input:focus{border-color:var(--accent)}
  .remove-btn{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
  .remove-btn:hover{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.4);color:#ff5555}
  .add-btn{width:100%;padding:10px;border-radius:9px;border:1px dashed rgba(124,92,252,0.35);background:transparent;color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;letter-spacing:0.05em}
  .add-btn:hover{background:rgba(124,92,252,0.1);border-style:solid}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .opt-group{display:flex;flex-direction:column;gap:5px}
  .opt-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:0.08em}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;outline:none;width:100%;cursor:pointer;transition:border-color 0.2s}
  select:focus{border-color:var(--accent)}
  input[type=range]{background:transparent;border:none;border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:0;outline:none;width:100%;cursor:pointer;-webkit-appearance:none;height:20px;margin:4px 0}
  input[type=range]::-webkit-slider-track{height:3px;background:var(--surface3);border-radius:2px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);margin-top:-5px;cursor:pointer}
  .range-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)}
  .gen-btn{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--logo-orange),var(--logo-orange2));color:white;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;cursor:pointer;transition:opacity 0.2s,transform 0.15s;text-transform:uppercase;box-shadow:0 4px 18px rgba(255,85,0,0.35)}
  .gen-btn:hover{opacity:0.9;transform:translateY(-1px)}
  .gen-btn:active{transform:translateY(0)}

  /* TABS */
  .tabs-header{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0;background:var(--surface)}
  .tab-btn{padding:14px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;margin-bottom:-1px;display:flex;align-items:center;gap:8px}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--logo-orange);border-bottom-color:var(--logo-orange)}
  .tab-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:0.7}

  /* CANVAS AREA */
  .canvas-outer{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
  .canvas-area{overflow-y:auto;padding:24px;flex:1}
  .canvas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .canvas-header h2{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);letter-spacing:0.18em;text-transform:uppercase}
  .gradients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .gradient-card{border-radius:14px;overflow:hidden;border:2px solid var(--border);background:var(--surface);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;cursor:pointer}
  .gradient-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
  .gradient-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.25)}
  .gradient-preview{height:130px;width:100%;display:block}
  .gradient-info{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .gradient-name{font-size:12px;font-weight:700;color:var(--text)}
  .gradient-css{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
  .card-select-badge{font-family:'DM Mono',monospace;font-size:9px;background:rgba(124,92,252,0.12);border:1px solid rgba(124,92,252,0.25);color:var(--accent);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted)}
  .empty-state .big{font-size:44px;margin-bottom:12px;opacity:0.25}
  .empty-state p{font-family:'DM Mono',monospace;font-size:12px;line-height:1.9}

  /* FLUID OPTIONS */
  .fluid-opts{display:flex;flex-direction:column;gap:16px;padding:0 0 8px}
  .fluid-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  /* PANEL DIREITO */
  .preview-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
  .preview-panel-header{padding:18px 20px 0;flex-shrink:0}
  .preview-canvas-wrap{flex-shrink:0;position:relative;margin:14px 20px 0;border-radius:11px;overflow:hidden;border:1px solid var(--border);background:repeating-conic-gradient(#1a1a26 0% 25%,#0f0f18 0% 50%) 0 0/18px 18px}
  .preview-canvas-wrap canvas{width:100%;height:auto;display:block}
  .aspect-indicator{position:absolute;bottom:7px;right:7px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.55);background:rgba(0,0,0,0.55);padding:3px 7px;border-radius:4px;backdrop-filter:blur(4px)}
  .dl-options{padding:14px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
  .format-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .fmt-btn{padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.18s;text-align:center;font-weight:500}
  .fmt-btn:hover{border-color:rgba(124,92,252,0.4);color:var(--text)}
  .fmt-btn.active{background:rgba(124,92,252,0.18);border-color:var(--accent);color:var(--accent)}
  .size-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
  .size-btn{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.18s;text-align:center;line-height:1.4}
  .size-btn:hover{border-color:rgba(124,92,252,0.4);color:var(--text)}
  .size-btn.active{background:rgba(124,92,252,0.18);border-color:var(--accent);color:var(--accent)}
  .size-btn .size-dims{font-size:9px;color:inherit;opacity:0.65;display:block}
  .custom-size-row{display:flex;align-items:center;gap:6px}
  .custom-size-row input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;outline:none;flex:1;transition:border-color 0.2s;-moz-appearance:textfield}
  .custom-size-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  .custom-size-row input[type=number]:focus{border-color:var(--accent)}
  .custom-size-row span{color:var(--text-muted);font-family:'DM Mono',monospace;font-size:14px}
  .dl-main-btn{margin:0 20px 18px;padding:14px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0}
  .dl-main-btn:hover{opacity:0.9;transform:translateY(-1px)}
  .dl-main-btn:active{transform:translateY(0)}
  .no-selection{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:24px;text-align:center;color:var(--text-muted)}
  .no-selection .icon{font-size:34px;opacity:0.2}
  .no-selection p{font-family:'DM Mono',monospace;font-size:11px;line-height:1.8}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface2);border:1px solid rgba(124,92,252,0.3);border-radius:10px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="section-label">Cores (Hash)</div>
      <div id="color-list"></div>
      <button class="add-btn" onclick="addColor()">+ Adicionar cor</button>
    </div>

    <div id="normal-opts">
      <div class="section-label">Configurações</div>
      <div class="options-grid">
        <div class="opt-group">
          <span class="opt-label">Tipo</span>
          <select id="grad-type">
            <option value="linear">Linear</option>
            <option value="radial">Radial</option>
            <option value="conic">Cônico</option>
          </select>
        </div>
        <div class="opt-group">
          <span class="opt-label">Variações</span>
          <select id="grad-qty">
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="8" selected>8</option>
            <option value="12">12</option>
            <option value="16">16</option>
          </select>
        </div>
        <div class="opt-group" style="grid-column:1/-1">
          <span class="opt-label">Ângulo — <span class="range-val" id="angle-val">135°</span></span>
          <input type="range" id="grad-angle" min="0" max="360" value="135" oninput="document.getElementById('angle-val').textContent=this.value+'°'">
        </div>
      </div>
    </div>

    <div id="fluid-opts" style="display:none">
      <div class="section-label">Estilo Fluido</div>
      <div class="fluid-opts">
        <div class="fluid-row">
          <div class="opt-group">
            <span class="opt-label">Intensidade</span>
            <select id="fluid-intensity">
              <option value="low">Suave</option>
              <option value="mid" selected>Médio</option>
              <option value="high">Intenso</option>
            </select>
          </div>
          <div class="opt-group">
            <span class="opt-label">Variações</span>
            <select id="fluid-qty">
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="8" selected>8</option>
              <option value="12">12</option>
            </select>
          </div>
        </div>
        <div class="opt-group">
          <span class="opt-label">Ruído — <span class="range-val" id="noise-val">0.4</span></span>
          <input type="range" id="fluid-noise" min="0" max="10" value="4" step="1" oninput="document.getElementById('noise-val').textContent=(this.value/10).toFixed(1)">
        </div>
        <div class="opt-group">
          <span class="opt-label">Escala — <span class="range-val" id="scale-val">1.2</span></span>
          <input type="range" id="fluid-scale" min="8" max="25" value="12" step="1" oninput="document.getElementById('scale-val').textContent=(this.value/10).toFixed(1)">
        </div>
      </div>
    </div>

    <button class="gen-btn" onclick="generateGradients()">✦ Gerar Gradientes</button>
  </aside>

  <!-- CENTRO: tabs + grid -->
  <div class="canvas-outer">
    <div class="tabs-header">
      <button class="tab-btn active" id="tab-normal" onclick="switchTab('normal')">
        <div class="tab-dot"></div> Normal
      </button>
      <button class="tab-btn" id="tab-fluid" onclick="switchTab('fluid')">
        <div class="tab-dot"></div> Fluido
      </button>
    </div>
    <main class="canvas-area">
      <div class="canvas-header">
        <h2 id="canvas-title">Gradientes — 0 gerados</h2>
      </div>
      <div class="gradients-grid" id="gradients-grid">
        <div class="empty-state">
          <div class="big">◈</div>
          <p>Configure as cores à esquerda<br>e clique em Gerar Gradientes</p>
        </div>
      </div>
    </main>
  </div>

  <!-- PAINEL DIREITO -->
  <aside class="preview-panel" id="preview-panel">
    <div id="panel-content" style="display:flex;flex-direction:column;height:100%">
      <div class="no-selection">
        <div class="icon">◱</div>
        <p>Selecione um gradiente<br>para ver o preview e<br>opções de download</p>
      </div>
    </div>
  </aside>
</div>

  { id:'3840x2160', label:'4K',       dims:'3840×2160' },
  { id:'custom',    label:'Custom',   dims:'livre'     },
];

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-normal').classList.toggle('active', tab==='normal');
  document.getElementById('tab-fluid').classList.toggle('active', tab==='fluid');
  document.getElementById('normal-opts').style.display = tab==='normal' ? 'block' : 'none';
  document.getElementById('fluid-opts').style.display  = tab==='fluid'  ? 'block' : 'none';
  selectedGradient = null;
  resetPanel();
  clearGrid();
}

function clearGrid() {
  document.getElementById('gradients-grid').innerHTML = `
    <div class="empty-state"><div class="big">◈</div>
    <p>Configure as cores e clique<br>em Gerar Gradientes</p></div>`;
  document.getElementById('canvas-title').textContent = 'Gradientes — 0 gerados';
}

// ============================================================
// COLOR MANAGEMENT
// ============================================================
function isValidHex(h){ return /^#?[0-9a-fA-F]{3,8}$/.test(h.trim()); }
function normalizeHex(h){ h=h.trim(); if(!h.startsWith('#')) h='#'+h; return h; }

function renderColors(){
  const list = document.getElementById('color-list');
  list.innerHTML = '';
  colors.forEach((color, i) => {
    const row = document.createElement('div');
    row.className = 'color-row';
    row.innerHTML = `
      <div class="color-swatch-wrap">
        <div class="swatch-preview" id="sw-${i}" style="background:${color}"></div>
        <input type="color" value="${color}" oninput="onColorPicker(${i},this.value)">
      </div>
      <input class="hash-input" type="text" value="${color}" placeholder="#RRGGBB"
        oninput="onHashInput(${i},this.value)" onblur="onHashBlur(${i},this.value)">
      ${colors.length > 2 ? `<button class="remove-btn" onclick="removeColor(${i})">×</button>` : ''}
    `;
    list.appendChild(row);
  });
}
function onColorPicker(i,val){
  colors[i]=val;
  const inputs=document.querySelectorAll('.hash-input');
  if(inputs[i]) inputs[i].value=val;
  const sw=document.getElementById('sw-'+i); if(sw) sw.style.background=val;
}
function onHashInput(i,val){
  if(isValidHex(val)){ const n=normalizeHex(val); colors[i]=n; const sw=document.getElementById('sw-'+i); if(sw) sw.style.background=n; }
}
function onHashBlur(i,val){
  if(isValidHex(val)) colors[i]=normalizeHex(val);
  else { const inputs=document.querySelectorAll('.hash-input'); if(inputs[i]) inputs[i].value=colors[i]; }
  renderColors();
}
function addColor(){ colors.push('#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')); renderColors(); }
function removeColor(i){ if(colors.length<=2) return; colors.splice(i,1); renderColors(); }

// ============================================================
// GRADIENT MATH — NORMAL
// ============================================================
function hexToRgb(hex){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  return {r:parseInt(hex.substr(0,2),16),g:parseInt(hex.substr(2,2),16),b:parseInt(hex.substr(4,2),16)};
}
function lerpColor(a,b,t){
  const ra=hexToRgb(a),rb=hexToRgb(b);
  return `rgb(${Math.round(ra.r+(rb.r-ra.r)*t)},${Math.round(ra.g+(rb.g-ra.g)*t)},${Math.round(ra.b+(rb.b-ra.b)*t)})`;
}
function shuffleArray(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function rotateArr(arr,n){ return [...arr.slice(n),...arr.slice(0,n)]; }

function generateVariations(baseColors,qty,type,angle){
  const results=[], used=new Set();
  results.push({name:'Original',colors:[...baseColors],angle,type});
  results.push({name:'Invertido',colors:[...baseColors].reverse(),angle,type});
  const angles=[0,45,90,135,180,225,270,315];
  for(const a of angles){ if(results.length>=qty) break; if(a===angle) continue; results.push({name:`${a}°`,colors:[...baseColors],angle:a,type}); }
  for(let r=1;r<baseColors.length&&results.length<qty;r++) results.push({name:`Rotação ${r}`,colors:rotateArr(baseColors,r),angle,type});
  for(let s=0;s<8&&results.length<qty;s++){
    const sh=shuffleArray(baseColors); const key=sh.join(',');
    if(!used.has(key)){ used.add(key); results.push({name:`Mix ${s+1}`,colors:sh,angle:angle+s*22,type}); }
  }
  if(baseColors.length>=2&&results.length<qty){
    const wm=[];
    for(let i=0;i<baseColors.length-1;i++){ wm.push(baseColors[i]); wm.push(lerpColor(baseColors[i],baseColors[i+1],0.5)); }
    wm.push(baseColors[baseColors.length-1]);
    results.push({name:'Suavizado',colors:wm,angle,type});
  }
  return results.slice(0,qty);
}

function drawNormalGradient(canvas, colorArr, type, angle){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  let grad;
  if(type==='linear'){
    const rad=(angle-90)*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
    const len=(Math.abs(cos)*W+Math.abs(sin)*H)/2, cx=W/2, cy=H/2;
    grad=ctx.createLinearGradient(cx-cos*len,cy-sin*len,cx+cos*len,cy+sin*len);
  } else if(type==='radial'){
    grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/1.8);
  } else {
    grad=ctx.createConicGradient(angle*Math.PI/180,W/2,H/2);
  }
  colorArr.forEach((c,i)=>grad.addColorStop(i/(colorArr.length-1),c));
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
}

// ============================================================
// GRADIENT MATH — FLUID (mesh/blob style)
// ============================================================
function drawFluidGradient(canvas, colorArr, seed, intensityKey, noiseAmt, scaleFactor){
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Dark base from first color, darkened
  const baseRgb = hexToRgb(colorArr[0]);
  ctx.fillStyle = `rgb(${Math.round(baseRgb.r*0.25)},${Math.round(baseRgb.g*0.25)},${Math.round(baseRgb.b*0.3)})`;
  ctx.fillRect(0,0,W,H);

  const intensityMap = { low: 0.55, mid: 0.78, high: 0.95 };
  const alpha = intensityMap[intensityKey] || 0.78;

  // Seeded pseudo-random
  function rand(n){ return Math.abs(Math.sin(seed * 127.1 + n * 311.7) * 43758.5453) % 1; }

  const blobCount = colorArr.length * 2 + 2;
  for(let b = 0; b < blobCount; b++){
    const ci = b % colorArr.length;
    const rgb = hexToRgb(colorArr[ci]);
    const cx = rand(b*7+1) * W;
    const cy = rand(b*7+2) * H;
    const rx = (0.3 + rand(b*7+3) * 0.55) * W * scaleFactor;
    const ry = (0.3 + rand(b*7+4) * 0.55) * H * scaleFactor;
    const angle = rand(b*7+5) * Math.PI * 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(rx,ry));
    grd.addColorStop(0,   `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`);
    grd.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha*0.5})`);
    grd.addColorStop(1,   `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);

    ctx.scale(rx/Math.max(rx,ry), ry/Math.max(rx,ry));
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(rx,ry), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Gaussian blur simulation via multiple passes of box blur
  if(noiseAmt > 0){
    applyBlur(ctx, W, H, noiseAmt * 18);
  }
}

function applyBlur(ctx, W, H, radius){
  // Approximate blur with multiple smaller box blurs (fast)
  const passes = 3;
  const r = Math.round(radius / passes);
  if(r < 1) return;
  for(let p=0; p<passes; p++){
    boxBlurH(ctx, W, H, r);
    boxBlurV(ctx, W, H, r);
  }
}

function boxBlurH(ctx, W, H, r){
  const imageData = ctx.getImageData(0,0,W,H);
  const d = imageData.data;
  const out = new Uint8ClampedArray(d.length);
  const iarr = 1 / (r+r+1);
  for(let i=0; i<H; i++){
    const row = i*W*4;
    for(let j=0; j<W; j++){
      let rr=0,gg=0,bb=0,aa=0,cnt=0;
      for(let k=-r; k<=r; k++){
        const col = Math.max(0,Math.min(W-1,j+k))*4;
        rr+=d[row+col]; gg+=d[row+col+1]; bb+=d[row+col+2]; aa+=d[row+col+3]; cnt++;
      }
      const o=row+j*4;
      out[o]=rr/cnt; out[o+1]=gg/cnt; out[o+2]=bb/cnt; out[o+3]=aa/cnt;
    }
  }
  d.set(out); ctx.putImageData(imageData,0,0);
}

function boxBlurV(ctx, W, H, r){
  const imageData = ctx.getImageData(0,0,W,H);
  const d = imageData.data;
  const out = new Uint8ClampedArray(d.length);
  for(let j=0; j<W; j++){
    for(let i=0; i<H; i++){
      let rr=0,gg=0,bb=0,aa=0,cnt=0;
      for(let k=-r; k<=r; k++){
        const row=Math.max(0,Math.min(H-1,i+k))*W*4;
        const col=j*4;
        rr+=d[row+col]; gg+=d[row+col+1]; bb+=d[row+col+2]; aa+=d[row+col+3]; cnt++;
      }
      const o=(i*W+j)*4;
      out[o]=rr/cnt; out[o+1]=gg/cnt; out[o+2]=bb/cnt; out[o+3]=aa/cnt;
    }
  }
  d.set(out); ctx.putImageData(imageData,0,0);
}

// ============================================================
// GENERATE
// ============================================================
function generateGradients(){
  if(colors.length < 2){ showToast('Adicione pelo menos 2 cores!'); return; }

  selectedGradient = null;
  resetPanel();

  if(currentTab === 'normal'){
    const type  = document.getElementById('grad-type').value;
    const angle = parseInt(document.getElementById('grad-angle').value);
    const qty   = parseInt(document.getElementById('grad-qty').value);
    allVariations = generateVariations(colors, qty, type, angle);
    renderNormalGrid();
  } else {
    const qty       = parseInt(document.getElementById('fluid-qty').value);
    const intensity = document.getElementById('fluid-intensity').value;
    const noise     = parseInt(document.getElementById('fluid-noise').value) / 10;
    const scale     = parseInt(document.getElementById('fluid-scale').value) / 10;
    allVariations = [];
    for(let i=0; i<qty; i++){
      allVariations.push({ name: `Fluido ${i+1}`, seed: Math.random()*1000+i*137, colors:[...colors], intensity, noise, scale, kind:'fluid' });
    }
    renderFluidGrid();
  }

  document.getElementById('canvas-title').textContent = `Gradientes — ${allVariations.length} gerados`;
}

function renderNormalGrid(){
  const grid = document.getElementById('gradients-grid');
  grid.innerHTML = '';
  allVariations.forEach((v,idx) => {
    const card = makeCard(v.name, idx);
    const canvas = card.querySelector('canvas');
    canvas.width=440; canvas.height=260;
    drawNormalGradient(canvas, v.colors, v.type, v.angle);
    grid.appendChild(card);
  });
}

function renderFluidGrid(){
  const grid = document.getElementById('gradients-grid');
  grid.innerHTML = '';
  allVariations.forEach((v,idx) => {
    const card = makeCard(v.name, idx);
    const canvas = card.querySelector('canvas');
    canvas.width=440; canvas.height=260;
    // Use smaller canvas for preview (blur is expensive)
    const previewCanvas = document.createElement('canvas');
    previewCanvas.width=220; previewCanvas.height=130;
    drawFluidGradient(previewCanvas, v.colors, v.seed, v.intensity, v.noise * 0.5, v.scale);
    const ctx2 = canvas.getContext('2d');
    ctx2.drawImage(previewCanvas, 0, 0, 440, 260);
    grid.appendChild(card);
  });
}

function makeCard(name, idx){
  const card = document.createElement('div');
  card.className = 'gradient-card';
  card.dataset.idx = idx;
  const canvas = document.createElement('canvas');
  canvas.className = 'gradient-preview';
  const info = document.createElement('div');
  info.className = 'gradient-info';
  info.innerHTML = `<div><div class="gradient-name">${name}</div></div><div class="card-select-badge">↓ Baixar</div>`;
  card.appendChild(canvas);
  card.appendChild(info);
  card.addEventListener('click', ()=>selectGradient(idx));
  return card;
}

// ============================================================
// SELECTION & PANEL
// ============================================================
function selectGradient(idx){
  selectedGradient = allVariations[idx];
  document.querySelectorAll('.gradient-card').forEach((c,i)=>c.classList.toggle('selected',i===idx));
  renderPanel();
}

function resetPanel(){
  document.getElementById('panel-content').innerHTML = `
    <div class="no-selection">
      <div class="icon">◱</div>
      <p>Selecione um gradiente<br>para ver o preview e<br>opções de download</p>
    </div>`;
}

function getSelectedDimensions(){
  if(selectedSize==='custom') return [customW, customH];
  const s = SIZES.find(s=>s.id===selectedSize);
  if(!s||s.dims==='livre') return [customW,customH];
  return s.dims.replace('×','x').split('x').map(Number);
}

function renderPanel(){
  if(!selectedGradient){ resetPanel(); return; }
  const v = selectedGradient;
  const [pw,ph] = getSelectedDimensions();
  // Preview canvas: fit inside ~316px wide, max 220px tall
  const ratio = ph/pw;
  const maxPW = 316, maxPH = 220;
  let preH = Math.round(maxPW * ratio);
  let preW = maxPW;
  if(preH > maxPH){ preH = maxPH; preW = Math.round(maxPH / ratio); }

  const pc = document.getElementById('panel-content');
  pc.innerHTML = `
    <div class="preview-panel-header">
      <div class="section-label">Preview — ${v.name}</div>
    </div>
    <div class="preview-canvas-wrap" style="margin:14px 20px 0">
      <canvas id="preview-canvas" width="${preW}" height="${preH}" style="width:100%;height:auto;display:block"></canvas>
      <div class="aspect-indicator" id="aspect-ind">${pw}×${ph}</div>
    </div>
    <div class="dl-options">
      <div>
        <div class="opt-label" style="margin-bottom:8px">Formato</div>
        <div class="format-btns">
          ${FORMATS.map(f=>`<button class="fmt-btn${selectedFormat===f.id?' active':''}" onclick="setFormat('${f.id}')">${f.label}</button>`).join('')}
        </div>
      </div>
      <div id="quality-section" style="display:${['jpg','webp'].includes(selectedFormat)?'flex':'none'};flex-direction:column;gap:5px">
        <span class="opt-label">Qualidade — <span class="range-val" id="quality-val">92%</span></span>
        <input type="range" id="quality-range" min="10" max="100" value="92" oninput="document.getElementById('quality-val').textContent=this.value+'%'">
      </div>
      <div>
        <div class="opt-label" style="margin-bottom:8px">Tamanho de saída</div>
        <div class="size-btns">
          ${SIZES.filter(s=>s.id!=='custom').map(s=>`
            <button class="size-btn${selectedSize===s.id?' active':''}" onclick="setSize('${s.id}')">
              ${s.label}<span class="size-dims">${s.dims}</span>
            </button>`).join('')}
        </div>
        <div style="margin-top:6px">
          <button class="size-btn${selectedSize==='custom'?' active':''}" style="width:100%;margin-bottom:6px" onclick="setSize('custom')">
            Custom<span class="size-dims">definir abaixo</span>
          </button>
          <div class="custom-size-row" id="custom-row" style="display:${selectedSize==='custom'?'flex':'none'}">
            <input type="number" id="cw" value="${customW}" min="1" max="8000" placeholder="Largura" oninput="onCustomSize()">
            <span>×</span>
            <input type="number" id="ch" value="${customH}" min="1" max="8000" placeholder="Altura" oninput="onCustomSize()">
          </div>
        </div>
      </div>
    </div>
    <button class="dl-main-btn" onclick="doDownload()">↓ Baixar ${selectedFormat.toUpperCase()} — ${pw}×${ph}px</button>
  `;

  drawPreviewCanvas();
}

function drawPreviewCanvas(){
  const pc = document.getElementById('preview-canvas');
  if(!pc||!selectedGradient) return;
  const v = selectedGradient;
  if(v.kind==='fluid'){
    const small = document.createElement('canvas');
    small.width=pc.width; small.height=pc.height;
    drawFluidGradient(small, v.colors, v.seed, v.intensity, v.noise*0.4, v.scale);
    pc.getContext('2d').drawImage(small,0,0);
  } else {
    drawNormalGradient(pc, v.colors, v.type, v.angle);
  }
}

function setFormat(fmt){
  selectedFormat = fmt;
  const qs = document.getElementById('quality-section');
  if(qs) qs.style.display = ['jpg','webp'].includes(fmt) ? 'flex' : 'none';
  document.querySelectorAll('.fmt-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.toLowerCase()===fmt);
  });
  updateDlBtn();
}

function setSize(id){
  selectedSize = id;
  if(id !== 'custom'){
    const s = SIZES.find(s=>s.id===id);
    if(s && s.dims !== 'livre'){
      const parts = s.dims.replace('×','x').split('x');
      customW=parseInt(parts[0]); customH=parseInt(parts[1]);
    }
  }
  renderPanel(); // re-render to update preview ratio
}

function onCustomSize(){
  customW = parseInt(document.getElementById('cw').value)||1920;
  customH = parseInt(document.getElementById('ch').value)||1080;
  const ai = document.getElementById('aspect-ind');
  if(ai) ai.textContent = `${customW}×${customH}`;
  updateDlBtn();
}

function updateDlBtn(){
  const btn = document.querySelector('.dl-main-btn');
  if(btn){ const [w,h]=getSelectedDimensions(); btn.textContent=`↓ Baixar ${selectedFormat.toUpperCase()} — ${w}×${h}px`; }
}

// ============================================================
// DOWNLOAD — canvas rendered at EXACT output size
// ============================================================
function buildSVG(colorArr,type,angle,w,h){
  const stops=colorArr.map((c,i)=>`<stop offset="${Math.round(i/(colorArr.length-1)*100)}%" stop-color="${c}"/>`).join('');
  let gradEl='',ref='';
  if(type==='radial'){ gradEl=`<radialGradient id="g" cx="50%" cy="50%" r="70%">${stops}</radialGradient>`; ref='url(#g)'; }
  else {
    const rad=(angle-90)*Math.PI/180, cos=Math.cos(rad), sin=Math.sin(rad);
    const x1=Math.round((0.5-cos*0.5)*100), y1=Math.round((0.5-sin*0.5)*100);
    const x2=Math.round((0.5+cos*0.5)*100), y2=Math.round((0.5+sin*0.5)*100);
    gradEl=`<linearGradient id="g" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%">${stops}</linearGradient>`; ref='url(#g)';
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><defs>${gradEl}</defs><rect width="${w}" height="${h}" fill="${ref}"/></svg>`;
}

function doDownload(){
  if(!selectedGradient){ showToast('Selecione um gradiente primeiro!'); return; }
  const v = selectedGradient;
  const [w,h] = getSelectedDimensions();
  const name = v.name.toLowerCase().replace(/\s+/g,'-');
  const quality = (parseInt((document.getElementById('quality-range')||{}).value)||92)/100;

  // SVG — only for normal gradients
  if(selectedFormat === 'svg'){
    if(v.kind === 'fluid'){ showToast('SVG não suportado para Fluido — use PNG/WebP'); return; }
    const svg = buildSVG(v.colors, v.type, v.angle, w, h);
    const blob = new Blob([svg],{type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    triggerDownload(url, `gradient-${name}-${w}x${h}.svg`);
    URL.revokeObjectURL(url);
    showToast(`SVG baixado — ${w}×${h}`);
    return;
  }

  // Raster: render at EXACT output dimensions
  showToast('Gerando imagem…');
  const offscreen = document.createElement('canvas');
  offscreen.width  = w;
  offscreen.height = h;

  if(v.kind === 'fluid'){
    // For fluid at large sizes, render at 1/2 then draw scaled (blur still looks good)
    const scale2 = Math.min(1, 1200/Math.max(w,h));
    const tmp = document.createElement('canvas');
    tmp.width  = Math.round(w * scale2);
    tmp.height = Math.round(h * scale2);
    drawFluidGradient(tmp, v.colors, v.seed, v.intensity, v.noise, v.scale);
    offscreen.getContext('2d').drawImage(tmp, 0, 0, w, h);
  } else {
    drawNormalGradient(offscreen, v.colors, v.type, v.angle);
  }

  let mimeType='image/png', ext='png';
  if(selectedFormat==='jpg'){ mimeType='image/jpeg'; ext='jpg'; }
  else if(selectedFormat==='webp'){ mimeType='image/webp'; ext='webp'; }

  offscreen.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    triggerDownload(url, `gradient-${name}-${w}x${h}.${ext}`);
    URL.revokeObjectURL(url);
    showToast(`${ext.toUpperCase()} baixado — ${w}×${h}px`);
  }, mimeType, quality);
}

function triggerDownload(url, filename){
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderColors();
</script>
